name: math-audit
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - openai
  - pymupdf
  - pypdf
  - markdown
  - jupyterlab
  - ipykernel
  - numpy
  - sympy
  - pip:
      # Windows uses the tested Qt-for-Python build. PySide6 resolves matching
      # Addons, Essentials, and shiboken6 versions from this exact requirement.
      - 'PySide6==6.9.3; sys_platform == "win32"'
      # Keep the existing supported range on non-Windows platforms.
      - 'PySide6>=6.7; sys_platform != "win32"'
